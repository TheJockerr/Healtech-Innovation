spring.application.name=healthtech-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/healthtech_db
spring.datasource.username=healthtech
spring.datasource.password=healthtech123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=healthtech-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server
server.port=8080
